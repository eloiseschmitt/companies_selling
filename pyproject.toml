[tool.ruff]
line-length = 88
target-version = "py310"
exclude = [
    ".git",
    ".idea",
    ".venv",
    "venv",
    "__pycache__",
    "downloads",
]

[tool.ruff.lint]
select = [
    "E4",
    "E7",
    "E9",
    "F",
    "I",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.mypy]
python_version = "3.10"
files = [
    "admin.py",
    "app.py",
    "constants.py",
    "download_annual_accounts.py",
    "generate_companies_html.py",
    "import_financial_documents.py",
    "import_siren_csv_companies.py",
    "init_financial_documents.py",
    "main.py",
    "populate_naf_db.py",
    "scripts",
    "services",
    "tests",
]
exclude = [
    "venv",
    ".venv",
    "__pycache__",
    "downloads",
]
ignore_missing_imports = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_unreachable = true
