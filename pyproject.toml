[tool.ruff]
line-length = 88
target-version = "py310"
exclude = [
    ".git",
    ".idea",
    ".venv",
    "venv",
    "__pycache__",
    "downloads",
]

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "UP",
    "B",
    "SIM",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.mypy]
python_version = "3.10"
files = [
    "admin.py",
    "app.py",
    "constants.py",
    "download_annual_accounts.py",
    "generate_companies_html.py",
    "import_financial_documents.py",
    "import_siren_csv_companies.py",
    "init_financial_documents.py",
    "main.py",
    "populate_naf_db.py",
    "scripts",
    "services",
    "tests",
]
exclude = [
    "venv",
    ".venv",
    "__pycache__",
    "downloads",
]
ignore_missing_imports = true
check_untyped_defs = true
disallow_untyped_defs = false
disallow_incomplete_defs = false
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_unreachable = true
show_error_codes = true
pretty = true

[tool.unittest]
start-directory = "tests"
pattern = "test*.py"
top-level-directory = "."
